<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mummy & Papa's Special Page</title>
    <style>
        body {
            font-family: 'Times New Roman', serif;
            background: #fdf6e3;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            text-align: center;
            border: 5px double #b8860b;
            max-width: 500px;
            position: relative;
            z-index: 5;
        }
        h1 { color: #8b4513; font-size: 2.2rem; margin-bottom: 5px; }
        
        /* WhatsApp Prank Style */
        .whatsapp-alert {
            background: #25d366; color: white;
            padding: 12px; border-radius: 10px;
            font-size: 0.95rem; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: none; animation: slideDown 0.5s ease;
        }

        /* The Blessings Meter */
        .meter-container {
            background: #eee; height: 30px; border-radius: 20px;
            margin: 25px 0; position: relative; overflow: hidden;
            border: 1px solid #ddd;
        }
        .meter-fill {
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            width: 0%; height: 100%;
            transition: width 3s cubic-bezier(0.1, 0.7, 1.0, 0.1);
        }
        .meter-text {
            position: absolute; width: 100%; top: 5px; left: 0;
            font-size: 0.85rem; font-weight: bold; color: #444;
        }

        .btn-box {
            margin-top: 30px; display: flex;
            justify-content: center; gap: 20px; height: 70px;
        }
        .btn {
            padding: 15px 35px; border-radius: 30px; border: none;
            font-size: 1.1rem; cursor: pointer; font-weight: bold;
            transition: 0.2s;
        }
        #yesBtn { background: #8b4513; color: white; box-shadow: 0 4px #5d2e0d; }
        #noBtn { background: #e0e0e0; color: #777; position: relative; }

        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .falling { position: fixed; pointer-events: none; animation: drop 4s linear forwards; z-index: 1; }
        @keyframes drop { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body onload="startPage()">

<div class="card">
    <div class="whatsapp-alert" id="wa-msg">
        📩 <strong>Family Group:</strong> "kha ghum rhe ?."
    </div>

    <h1>Mummy & Papa's Portal</h1>
    <p style="color: #666; font-style: italic;">Official Love & Blessing Verification</p>
    
    <div class="meter-container">
        <div class="meter-fill" id="meter"></div>
        <div class="meter-text" id="meterLabel">Aashirwad Level: Scanning...</div>
    </div>

    <p style="font-size: 1.4rem;"><strong>Do you love Rakhi?</strong></p>

    <div class="btn-box">
        <button id="yesBtn" class="btn" onclick="celebrate()">YES, ALWAYS!</button>
        <button id="noBtn" class="btn" onmouseover="softEscape()">No</button>
    </div>
</div>

<script>
    function startPage() {
        // Show WhatsApp msg after 2 seconds
        setTimeout(() => { document.getElementById('wa-msg').style.display = 'block'; }, 2000);
        
        // Start filling the meter
        const fill = document.getElementById('meter');
        const label = document.getElementById('meterLabel');
        setTimeout(() => { 
            fill.style.width = '100%'; 
            label.innerText = "Aashirwad Level: INFINITE ❤️";
            label.style.color = "white";
        }, 800);
    }

    function softEscape() {
        const btn = document.getElementById('noBtn');
        // Gentle parent-style redirection
        const prompts = ["Wrong click!", "Mummy says NO to this button", "Papa, click the other one!", "Are you sure? ☕"];
        btn.innerText = prompts[Math.floor(Math.random() * prompts.length)];
        
        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 100);
        btn.style.position = 'fixed';
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
    }

    function celebrate() {
        const card = document.querySelector('.card');
        card.innerHTML = `
            <h1 style="font-size: 3rem;">🌹 आशीर्वाद 🌹</h1>
            <h2 style="color: #8b4513;">Verification Successful!</h2>
            <p style="font-size: 1.2rem;">Rakhi is officially the world's best daughter-in-law.</p>
            <p>Reward: 100% Peace and 0% Scolding for the next week.</p>
        `;
        document.body.style.background = "#fff9e6";
        
        // Flower rain
        setInterval(() => {
            const f = document.createElement('div');
            f.className = 'falling';
            f.innerHTML = ["🌸", "🌹", "✨", "🙏"][Math.floor(Math.random() * 4)];
            f.style.left = Math.random() * 100 + "vw";
            f.style.top = "-5vh";
            f.style.fontSize = "30px";
            document.body.appendChild(f);
        }, 150);
    }
</script>

</body>
</html>
